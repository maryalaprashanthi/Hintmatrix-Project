<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Common CSS -->
    <link rel="stylesheet" href="css/style.css">

    <title>Add Branch</title>
</head>
<body>

<div class="container py-5">

    <div class="form-card">

        <h3 class="form-title">Branch</h3>

        <form>

            <!-- Active Row -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Active Row</label>
                <div class="col-md-3">
                    <input type="number" class="form-control" value="0">
                </div>
            </div>

            <!-- Row Status -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Row Status</label>
                <div class="col-md-3">
                    <input type="number" class="form-control" value="0">
                </div>
            </div>

            <!-- College -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">College</label>

                <div class="col-md-5">
                    <select class="form-select">
                        <option>---------</option>
                    </select>
                </div>

                <div class="col-md-4 d-flex gap-2">
                    <button type="button" class="btn btn-outline-primary">
                        <i class="bi bi-pencil-square me-1"></i> Edit
                    </button>

                    <button type="button" class="btn btn-outline-danger">
                        <i class="bi bi-trash me-1"></i> Delete
                    </button>
                </div>
            </div>

            <!-- Branch Name -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Branch Name</label>
                <div class="col-md-5">
                    <input type="text" class="form-control">
                </div>
            </div>

            <!-- Address -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Address</label>
                <div class="col-md-5">
                    <textarea class="form-control" rows="3"></textarea>
                </div>
            </div>

            <!-- Phone Number -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Phone Number</label>
                <div class="col-md-5">
                    <input type="text" class="form-control">
                </div>
            </div>

            <!-- Email -->
            <div class="row mb-3">
                <label class="col-md-3 col-form-label">Email</label>
                <div class="col-md-5">
                    <input type="email" class="form-control">
                </div>
            </div>

            <!-- Buttons -->
            <div class="text-end mt-4">

                <button type="button" class="btn btn-secondary">
                    Save and Add Another
                </button>

                <button type="button" class="btn btn-secondary">
                    Save and Continue Editing
                </button>

                <button type="submit" class="btn btn-save">
                    Save
                </button>

            </div>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
